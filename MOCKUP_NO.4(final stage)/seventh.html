        function query() {

            const params = new URLSearchParams(window.location.search); //this reads the url data
            const selectedWard = params.get("ward"); //this strips the url data to get ward data
            const selectedTags = params.getAll("info");  //this strips the url data to get info data

            const main = document.querySelector("main");  //this connects the <script> with main

            selectedTags.forEach(tag => {   //this is basically "for each url do this"

                const url = tagToQuery[tag];

                if (!url) {                //if url is not valid it just says no dataset, the tag
                    console.log("No dataset for tag:", tag);
                    return;
                }

                fetch(url)                //this is where the actual getting API data happens
                    .then(res => res.json())       //turns the url into .json format
                    .then(data => {                //this send the collected data to "displayGraphs" with the tag,data,main and selelcted ward data
                    displayGraphs(tag, data, main, selectedWard);
                    })
                    .catch(err => console.error(err)); //this just catches any issues/errors and just does counsole.error(err)

            });
        }

        function displayGraphs(tag, data, main, selectedWard) {   //This is the actual FUNCTION that the collected data is gana be used in

            const container = document.createElement("div");    //this creates a <div></div> for later implimentation using .appendChild()
            const chartRow = document.createElement("div");     //this creates a <div></div> for later implimentation using .appendChild()
            chartRow.style.display = "flex";
            chartRow.style.gap = "20px";          // space between graphs
            chartRow.style.alignItems = "center"; // vertical alignment

            const title = document.createElement("h2");         //this creats a <h2></h2> for later implimentation using .appendChild()
            title.textContent = "Tag " + tag + " (" + selectedWard + ")";  //this defines what the title looks like
            container.appendChild(title);                      // this is the big part. here the title gets put in the container

            const features = data.features;                    //assigning data.features to the name "features"

            if (!features || features.length === 0) {                         //if features not found or === 0, kill it
                container.appendChild(document.createTextNode("No data"));
                main.appendChild(container);
                return;
            }

            const filtered = features.filter(f => {    //this takes the full data and filters it with just the ward (this filtering has issues with dataset 11
                const a = f.attributes;
                return a.WARD_NAME === selectedWard || a.WARD === selectedWard;
            });

            if (filtered.length === 0) {                                                      //kill it if nothing comes witht he filtering
                container.appendChild(document.createTextNode("No data for this ward"));
                main.appendChild(container);
                return;
            }

            const attributes = filtered[0].attributes;      //idk what this does

            const labels = [];
            const values = [];

            for (let key in attributes) {
                if (typeof attributes[key] === "number") {
                    labels.push(key);
                    values.push(attributes[key]);
                }
            }

            const finalLabels = labels.slice(0, 6);  // LIMIT so charts don’t explode
            const finalValues = values.slice(0, 6);


            const barCanvas = document.createElement("canvas"); // This is the first step in making the bar charts

            barCanvas.width = 800;   // this sets the size
            barCanvas.height = 400;

            new Chart(barCanvas, {    //using the previously defined "barCanvas" in line 142 (above the size changer) actually defining what the chat looks like
                type: 'bar',
                data: {
                    labels: finalLabels,
                    datasets: [{
                        label: 'Values',
                        data: finalValues
                    }]
                },
                options: {
                    responsive: false   // this is to make the sizing possible
                }
            });

            const pieCanvas = document.createElement("canvas");  // This is the first step in making the bar charts


            pieCanvas.width = 500;   // this sets the size
            pieCanvas.height = 300;

            new Chart(pieCanvas, {   //using the previously defined "pieCanvas" in line 161 (above the size changer) actually defining what the chat looks like
                type: 'pie',
                data: {
                    labels: finalLabels,
                    datasets: [{
                        data: finalValues
                    }]
                },
                options: {
                    responsive: false   // this is to make the sizing possible
                }
            });
            chartRow.appendChild(barCanvas);  //this puts the "barCanvas" in the chartRow box
            chartRow.appendChild(pieCanvas);  //this puts the "pieCanvas" in the chartRow box

            container.appendChild(chartRow);  //finally this put the "chatRow" box in the container box
            main.appendChild(container);      //finally finally this put this "container" box in the main where it is displayed
        }
