        function query() {

            const params = new URLSearchParams(window.location.search); //this reads the url data
            const selectedWard = params.get("ward"); //this strips the url data to get ward data
            const selectedWardName = params.get("Wname"); // strips url for ward name data
            const selectedTags = params.getAll("info");  //this strips the url data to get info data

            const main = document.querySelector("main");  //this connects the <script> with main

            selectedTags.forEach(tag => {   //this is basically "for each url do this"

                const url = pissbot[tag];

                fetch(url)                //this is where the actual getting API data happens
                    .then(res => res.json())       //turns the url into .json format
                    .then(data => {                //this send the collected data to "graphNdShi" with the tag,data,main and selelcted ward data
                    graphNdShi(tag, data, main, selectedWard, selectedWardName);
                    })
                    .catch(err => console.error(err)); //this just catches any issues/errors and just does counsole.error(err)

            });
        }

        function graphNdShi(tag, data, main, selectedWard, selectedWardName) {   //This is the actual FUNCTION that the collected data is gana be used in

            const container = document.createElement("div");    //this creates a <div></div> for later implimentation using .appendChild()
            const chartRow = document.createElement("div");     //this creates a <div></div> for later implimentation using .appendChild()
            chartRow.style.display = "flex";
            chartRow.style.gap = "20px";          // space between graphs
            chartRow.style.alignItems = "center"; // vertical alignment

            const title = document.createElement("h2");         //this creats a <h2></h2> for later implimentation using .appendChild()
            title.textContent = "Tag " + tag + " (" + selectedWardName + ")";  //this defines what the title looks like
            container.appendChild(title);                      // this is the big part. here the title gets put in the container

            const features = data.features;                    //assigning data.features to the name "features"


            const filtered = features.filter(f => {
                const a = f.attributes;

                const wardFields = [
                    a.WARD_NAME,
                    a.WARD,
                    a.Ward_name,   // dataset 27 uses this
                    a.NAME
                ];

                return wardFields.some(w =>
                    w && w.toString().toLowerCase().trim() === (selectedWardName || selectedWard).toLowerCase().trim()
                );
            });

            if (filtered.length === 0) {                                                      //this is really helpful rn as this shows which datasets are not accessable for some reason
                container.appendChild(document.createTextNode("No data for this ward"));
                main.appendChild(container);
                return;
            }

            const attributes = filtered[0].attributes;      //idk wtf this does from line 117 to line 130, again i think it is something to do with "what data the graphs end up using"

            const labels = [];
            const values = [];

            for (let key in attributes) {
                const value = attributes[key];

                if (
                    typeof value === "number" &&
                    !key.includes("CODE") &&
                    !key.includes("ID") &&
                    !key.includes("YEAR")
                ) {
                    labels.push(key.replaceAll("_", " "));
                    values.push(value);
                }
}

            const pairs = labels.map((label, i) => ({label, value: values[i]}));

            // sort biggest to smallest
            pairs.sort((a, b) => b.value - a.value);

            // take top 6
            const top = pairs.slice(0, 6);

            const finalLabels = top.map(p => p.label);
            const finalValues = top.map(p => p.value);


            const barCanvas = document.createElement("canvas"); // gotto have the "canvas" before making graphs

            barCanvas.width = 800;   // this sets the size
            barCanvas.height = 400;

            new Chart(barCanvas, {
                type: 'bar',
                data: {
                    labels: finalLabels,
                    datasets: [{
                        label: "Data",
                        data: finalValues
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        x: {
                            ticks: {
                                maxRotation: 45,
                                minRotation: 30
                            }
                        }
                    }
                }
            });

            const pieCanvas = document.createElement("canvas");  // canvas uwu


            pieCanvas.width = 500;   // this sets the size
            pieCanvas.height = 300;

            new Chart(pieCanvas, {   //using the previously defined "pieCanvas" in line 152 (above the size changer) actually defining what the chat looks like
                type: 'pie',    //type in any kinda graphs we need fr
                data: {
                    labels: finalLabels,
                    datasets: [{
                        data: finalValues
                    }]
                },
                options: {
                    responsive: false   // this is to make the sizing possible
                }
            });
            chartRow.appendChild(barCanvas);  //this puts the "barCanvas" in the chartRow box
            chartRow.appendChild(pieCanvas);  //this puts the "pieCanvas" in the chartRow box

            container.appendChild(chartRow);  //finally this put the "chatRow" box in the container box
            main.appendChild(container);      //finally finally this put this "container" box in the main where it is displayed
        }
