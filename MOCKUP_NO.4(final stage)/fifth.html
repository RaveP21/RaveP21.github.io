           function query() {

               const params = new URLSearchParams(window.location.search);  //this reads the url data
               const selectedTags = params.getAll("info");  //this strips the url data to get info data
               

               const main = document.querySelector("main");  //this connects the <script> with main

               selectedTags.forEach(tag => {  //this is basically "for each url do this"

                   const url = pissbot[tag];

                   fetch(url)            //this is where the actual getting API data happens
                       .then(res => res.json())        //turns the url into .json format
                       .then(data => {                  //the json .data is then taken
                           graphNdShi(tag, data, main);  //and sent to graphNdShi with the tag data as well
                       })

               });
           } 

           // to be able to actually rank the wards by the selected tag we need to tell the code which fields we are ranking the wards by. so before the graphndshi function, we need to add a function that takes the .data and looks for the most suitable field to rank the wards by. this is gonna be a bit of a pain but it is what it is.

           const tagRankingMetrics = {

            "1" : "NUM_SERVICE_USERS", // Social Care
            "2" : "WARD_NUMBER", // Education
            "3" : "TOTAL_CHILDREN_SOCIAL_CARE_NUM", // Children in Social Care
            "4" : "WARD_NUMBER", // Crime
            "5" : "WARD_NUMBER", // KS2 Attainment (Education)



           }


           function graphNdShi(tag, data, main) {  //This is the actual FUNCTION that the collected data is gana be used in

               const container = document.createElement("div"); //this creates a <div></div> for later implimentation using .appendChild()
               const chartRow = document.createElement("div");     //this creates a <div></div> for later implimentation using .appendChild()
               chartRow.style.display = "flex";
               chartRow.style.gap = "20px";          // space between graphs
               chartRow.style.alignItems = "center"; // vertical alignment


               const params = new URLSearchParams(window.location.search);  //this reads the url data
               const features = data.features;   //assigning data.features to the name "features"
               const title = document.createElement("h2");  //this creats a <h2></h2> for later implimentation using .appendChild()
               title.textContent = "Ward Ranking (Tag " + tag + ")";  //this defines what the title looks like
               container.appendChild(title);   // this is the part that solves world hunger. here the title gets put in the container

               

               if (!features || features.length === 0) {  //if features not found or === 0, kill it. this is hella usefull to see if all the datasets are working/returning calls
                   container.appendChild(document.createTextNode("No data"));
                   main.appendChild(container);
                   return;
               }

               
               const sample = features[0].attributes; 
               let rankingMetric = tagRankingMetrics[tag]; // Our default ranking metric if we can't find a suitable one
               
               if (!rankingMetric) {
                     // If no predefined metric, try to find a numeric field in the dataset to use for ranking
                    for (let key in sample) { //
                        const value = sample[key];
                        if (typeof value === "number" && 
                            !key.includes("CODE") && 
                            !key.includes("ID") && 
                            !key.includes("YEAR") &&
                            !key.includes("PERIOD")) {
                            rankingMetric = key;
                            break; // Use first numeric field as ranking metric
                        }
                    }

               if (!rankingMetric) {
                   container.appendChild(document.createTextNode("No numeric data to rank"));
                   main.appendChild(container);
                   return;
               }

               // Rank ALL wards by the selected metric
               const wardRankings = features
                   .filter(f => f.attributes[rankingMetric] !== null && f.attributes[rankingMetric] !== undefined)
                   .map(f => ({
                       wardName: f.attributes.WARD_NAME || f.attributes.Ward_name || f.attributes.NAME || "Unknown",
                       value: f.attributes[rankingMetric]
                   }))
                   .sort((a, b) => b.value - a.value)
                   .slice(0, 15); // Show top 15 wards

               const labels = wardRankings.map(w => w.wardName);
               const values = wardRankings.map(w => w.value);

               const canvas = document.createElement("canvas");
               canvas.width = 1200;
               canvas.height = 400;

               new Chart(canvas, {
                   type: 'bar',
                   data: {
                       labels: labels,
                       datasets: [{
                           label: rankingMetric.replaceAll("_", " "),
                           data: values,
                           backgroundColor: 'rgba(75, 192, 192, 0.7)',
                           borderColor: 'rgba(75, 192, 192, 1)',
                           borderWidth: 1
                       }]
                   },
                   options: {
                       indexAxis: 'y',
                       responsive: false,
                       plugins: {
                           legend: {
                               display: true
                           }
                       },
                       scales: {
                           y: {
                               ticks: {
                                   callback: function(value) {
                                       return labels[value];
                                   }
                               }
                           },
                           x: {
                               beginAtZero: true
                           }
                       }
                   }
               });

               container.appendChild(canvas);
               main.appendChild(container);
           }
        }
