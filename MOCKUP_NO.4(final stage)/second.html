            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>

    <script>
        // on click the map needs to send "ward_code" not "ward name" cuz, the dataset makers are ass
        // the ward_code needs to be sent to page 4, from where the it forwards it again to page 7
        // Function mapInfo takes ward coordinate data url, transforms it to usable object
        //  and creates loop for drawward function for all features

        function mapInfo(){
            let url = "https://maps2.bristol.gov.uk/server2/rest/services/ext/ll_boundaries/MapServer/4/query?where=1%3D1&outFields=*&outSR=4326&f=json&resultRecordCount=1000";
            fetch(url).then(r=>r.json()).then(json =>{

                let feature = json.features;

                for (let j=0; j<feature.length; j++){
                    
                    drawWard(feature[j], map);

                    

                }

            })
        }
        // Function drawWard takes the coordinates from "../geometry/rings" and stores it
        // in the first space in the array however it is stored as long lat and not lat long
        //  so latlngs stores the points the right way around
        function drawWard(feature, map){

            let a = feature.attributes;
            let wardName = a.NAME;
            let wardCode = a.WARD_ID;

            let ring = feature.geometry.rings[0];

            let latlngs = ring.map(point => [point[1], point[0]]);

            let polygon = L.polygon(latlngs, {
                color: "transparent",
                fillColor: "transparent",
                fillOpacity: 0,
                weight: 0
            }).addTo(map);

            polygon.bindTooltip(a.NAME, {sticky: true});

            polygon.on("mouseover", function () {
                    this.setStyle({
                        color: "blue",
                        fillColor: "blue",
                        fillOpacity: 0.5,
                        weight: 2
                    });
            })

            polygon.on("mouseout", function () {
                    this.setStyle({
                        color: "transparent",
                        fillColor: "transparent",
                        fillOpacity: 0,
                        weight: 0
                    });
              });

            polygon.on("click", function () {//changing the output url depending on the clicked marker
                window.location.href = `forth.html?role=${role}&ward=${encodeURIComponent(wardCode)}&Wname=${encodeURIComponent(a.NAME)}`;
    });

        }

       

            
        

    </script>
