<html>
 
<head>
    <title>Bike Pump Finder</title>
    <!-- font links -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"/>
    <link rel="preconnect" href="https://fonts.gstatic.com"> 
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@600&family=Roboto:wght@500&display=swap">
    <!--Leaflet stylesheet-->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" 
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin>
        <!--Leaflet javascript-->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <script>
        

        function outputMarkers(json) {
            let f = json.features;
            for(let i=0;i<f.length;i++) {
                let a = f[i].attributes;
                let lon = f[i].geometry.rings.x;
                let lat = f[i].geometry.rings.y;
                let marker = L.marker([lat,lon]).addTo(map);
                marker.bindPopup(`<b>${a.NAME}</b><br>${a.TYPE}`);
        }
    }

        function drawWard(features, map){
           
            let ring = features.geometry.rings[0];

            let latlngs = ring.map(point => [point[1], point[0]]);

            L.polygon(latlngs).addTo(map);
           
        }

     

        function mapQuery(){
            let url = "https://maps2.bristol.gov.uk/server2/rest/services/ext/ll_boundaries/MapServer/4/query?where=1%3D1&outFields=*&outSR=4326&f=json"
           fetch(url).then(r=>r.json()).then(json => {
                
            let features = json.features;

            for (let j=0; j<features.length;j++){
                
                
                
                drawWard(features[j], map);
            }})
        }

        

    </script>
</head>
 
<body>
    
    <div class="grid-container">
        <header class="gold padded">
            Bristol Wards
            <form id="search" action="index.html" >
                <input name="searchterm" type="text" placeholder="Search..." >
                <button type="submit"><i class="material-icons">search</i></button>
            </form>
        </header>
        <nav>
            <button onclick="location.href='map.html'" class="w3-button w3-blue w3-block w3-border w3-border-white">Ward</button>
            <button class="w3-button w3-blue w3-block w3-border w3-border-white">More ward</button>
        </nav>
        <main>
        <div id="map"></div>
        </main>
    </div>
    <script>
       var urlParams = new URLSearchParams(location.search);
        var lat = urlParams.get('lat') || 51.4545; // null lat is falsy, number is truthy
        var lon = urlParams.get('lon') || -2.5879; // null lon is falsy, number is truthy
 
        // see: https://leafletjs.com/examples/quick-start/
 
        // L for Leaflet - initialize the map centred on user or Bristol, zoom level 13
        var map = L.map('map').setView([lat,lon], 13);
 
        // attribution legally required by the OpenStreetMap license
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);
 
        mapQuery();
    </script>
</body>
 
</html>
