</div>

<script>

    const tagToQuery = {
    "1": "https://maps2.bristol.gov.uk/server2/rest/services/ext/ward_profiles/MapServer/1/query?where=1%3D1&outFields=WARD_CODE,WARD_NAME,SOCIAL_CARE_TYPE,PERIOD,NUM_SERVICE_USERS,AVG_WEEKLY_COST&outSR=4326&f=json",

    "2": "https://maps2.bristol.gov.uk/server2/rest/services/ext/ward_profiles/MapServer/3/query?where=1%3D1&outFields=*&outSR=4326&f=json",

    "4": "https://maps2.bristol.gov.uk/server2/rest/services/ext/ward_profiles/MapServer/6/query?where=1%3D1&outFields=*&outSR=4326&f=json",

    "8": "https://maps2.bristol.gov.uk/server2/rest/services/ext/ward_profiles/MapServer/19/query?where=1%3D1&outFields=WARD_CODE,WARD_NAME,GENDER,PERIOD,LIFE_EXPECTANCY_YEARS&outSR=4326&f=json",

    "9": "https://maps2.bristol.gov.uk/server2/rest/services/ext/ward_profiles/MapServer/22/query?where=1%3D1&outFields=WARD_CODE,WARD_NAME,PREMATURE_MORTALITY_TYPE,PERIOD,WARD_STATISTIC_RATE&outSR=4326&f=json",

    "10": "https://maps2.bristol.gov.uk/server2/rest/services/ext/ward_profiles/MapServer/15/query?where=1%3D1&outFields=WARD_CODE,WARD_NAME,ALL_HH_CAR_AVAIL,NO_CARS_VANS_IN_HH,CAR_VAN_IN_HH_1,CAR_VAN_IN_HH_2,CAR_VAN_IN_HH_3,PC_TOTAL_UNDEROCC_RATING_BED,PC_NO_CARS_VANS_IN_HH,PC_CAR_VAN_IN_HH_1,PC_CAR_VAN_IN_HH_2,PC_CAR_VAN_IN_HH_3&outSR=4326&f=json",

    "11": "https://maps2.bristol.gov.uk/server2/rest/services/ext/ward_profiles/MapServer/14/query?where=1%3D1&outFields=WARD_CODE,WARD_NAME,ALL_HOUSEHOLDS,ONE_PERSON_HH_TOTAL,SNGLFAM_HH_TOTAL,MULTFAM_HH_TOTAL,PC_ONE_PERSON_HH_TOTAL,PC_SNGLFAM_HH_TOTAL,PC_TOTAL_HH_DEP_CHILDREN,PC_MULTFAM_HH_TOTAL,TOTAL_HH_DEP_CHILDREN&outSR=4326&f=json",

    "13": "https://maps2.bristol.gov.uk/server2/rest/services/ext/ward_profiles/MapServer/15/query?where=1%3D1&outFields=WARD_CODE,WARD_NAME,TOTAL_HOUSEHOLDS_ACCOMM_TYPE,BEDROOM_1,BEDROOM_2,BEDROOM_3,BEDROOM_4_MORE,TOTAL_UNDEROCC_RATING_BED,TOTAL_OVERC_OCC_RATING_BED,PC_BEDROOM_1,PC_BEDROOM_2,PC_BEDROOM_3,PC_BEDROOM_4_MORE,PC_TOTAL_UNDEROCC_RATING_BED,PC_TOTAL_OVERC_OCC_RATING_BED&outSR=4326&f=json",

    "14": "https://maps2.bristol.gov.uk/server2/rest/services/ext/ward_profiles/MapServer/15/query?where=1%3D1&outFields=WARD_CODE,WARD_NAME,TOTAL_HOUSEHOLDS_ACCOMM_TYPE,TOTAL_OWNED,TOTAL_SOCIAL_RENTED,TOTAL_PRIVATE_RENTED_OTHER,PC_TOTAL_OWNED,PC_TOTAL_SOCIAL_RENTED,PC_TOTAL_PRIVATE_RENTED_OTHER&outSR=4326&f=json",

    "15": "https://maps2.bristol.gov.uk/server2/rest/services/ext/ward_profiles/MapServer/15/query?where=1%3D1&outFields=WARD_CODE,WARD_NAME,TOTAL_HOUSEHOLDS_ACCOMM_TYPE,WHOLE_HOUSE_DETACHED,WHOLE_HOUSE_SEMI,WHOLE_HOUSE_TERRACED,FLATS_TOTAL,PC_WHOLE_HOUSE_DETACHED,PC_WHOLE_HOUSE_SEMI,PC_WHOLE_HOUSE_TERRACED,PC_FLATS_TOTAL&outSR=4326&f=json",

    "17": "https://maps2.bristol.gov.uk/server2/rest/services/ext/ward_profiles/MapServer/11/query?where=1%3D1&outFields=*&outSR=4326&f=json",

    "18": "https://maps2.bristol.gov.uk/server2/rest/services/ext/ward_profiles/MapServer/17/query?where=1%3D1&outFields=*&outSR=4326&f=json",

    "19": "https://maps2.bristol.gov.uk/server2/rest/services/ext/ward_profiles/MapServer/28/query?where=1%3D1&outFields=*&outSR=4326&f=json",

    "20": "https://maps2.bristol.gov.uk/server2/rest/services/ext/ward_profiles/MapServer/16/query?where=1%3D1&outFields=WARD_CODE,WARD_NAME,TOTAL_USUALLY_RES_IDENTITY,BORN_OUTSIDE_UK,UNITED_KINGDOM,EU_COUNTRIES,OTHER_EUROPE,AFRICA,MIDDLE_EAST_AND_ASIA,AMERICAS_CARIBBEAN,ANTARCTICA_OCEANIA_OTHER,PC_BORN_OUTSIDE_UK,PC_UNITED_KINGDOM,PC_EU_COUNTRIES,PC_OTHER_EUROPE,PC_AFRICA,PC_MIDDLE_EAST_AND_ASIA,PC_AMERICAS_CARIBBEAN,PC_ANTARCTICA_OCEANIA_OTHER&outSR=4326&f=json",

    "22": "https://maps2.bristol.gov.uk/server2/rest/services/ext/ward_profiles/MapServer/16/query?where=1%3D1&outFields=WARD_CODE,WARD_NAME,TOTAL_RES_POP_ETHNIC_GROUP,WHITE_TOTAL,BAME_GROUP_TOTAL,ASIAN_BANGLADESHI,ASIAN_CHINESE,ASIAN_INDIAN,ASIAN_PAKISTANI,ASIAN_OTHER,BLACK_AFRICAN,BLACK_CARIBBEAN,BLACK_OTHER,MULT_WHITE_ASIAN,MULT_WH_BL_AFRCAN,MULT_WH_BL_CARIBBEAN,MULT_OTHER,WHITE_BRITISH,WHITE_IRISH,WHITE_GYPSY_TRAV,WHITE_ROMA,WHITE_OTHER,OTHER_ARAB,ANY_OTHER_ETHNIC_GROUP,PC_WHITE_TOTAL,PC_BAME_GROUP_TOTAL,PC_ASIAN_BANGLADESHI,PC_ASIAN_CHINESE,PC_ASIAN_INDIAN,PC_ASIAN_PAKISTANI,PC_ASIAN_OTHER,PC_BLACK_AFRICAN,PC_BLACK_CARIBBEAN,PC_BLACK_OTHER,PC_MULT_WHITE_ASIAN,PC_MULT_WH_BL_AFRICAN,PC_MULT_WH_BL_CARIBBEAN,PC_MULT_OTHER,PC_WHITE_BRITISH,PC_WHITE_IRISH,PC_WHITE_GYPSY_TRAV,PC_WHITE_ROMA,PC_WHITE_OTHER,PC_OTHER_ARAB,PC_ANY_OTHER_ETHNIC_GROUP&outSR=4326&f=json",

    "23": "https://maps2.bristol.gov.uk/server2/rest/services/ext/ward_profiles/MapServer/16/query?where=1%3D1&outFields=WARD_CODE,WARD_NAME,ALL_PPL_3_OVER_LANGUAGE,MAIN_LANG_ENGLISH,MAIN_LANG_NOT_ENGLISH,MAIN_LANG_NOT_ENG_VERY_WELL,MAIN_LANG_NOT_ENG_WELL,MAIN_LANG_NOT_ENG_NOT_WELL,MAIN_LANG_NOT_ENG_CANT,PC_MAIN_LANG_ENGLISH,PC_MAIN_LANG_NOT_ENGLISH,PC_MAIN_LANG_NOT_ENG_V_WELL,PC_MAIN_LANG_NOT_ENG_WELL,PC_MAIN_LANG_NOT_ENG_NOT_WELL,PC_MAIN_LANG_NOT_ENG_CANT&outSR=4326&f=json",

    "24": "https://maps2.bristol.gov.uk/server2/rest/services/ext/ward_profiles/MapServer/34/query?where=1%3D1&outFields=*&outSR=4326&f=json",

    "25": "https://maps2.bristol.gov.uk/server2/rest/services/ext/ward_profiles/MapServer/34/query?where=1%3D1&outFields=*&outSR=4326&f=json",

    "26": "https://maps2.bristol.gov.uk/server2/rest/services/ext/ward_profiles/MapServer/16/query?where=1%3D1&outFields=WARD_CODE,WARD_NAME,TOT_RES_POP_RELIGION,NO_RELIGION,CHRISTIAN,BUDDHIST,HINDU,JEWISH,MUSLIM,SIKH,OTHER_RELIGION,NOT_ANSWERED,PC_NO_RELIGION,PC_CHRISTIAN,PC_BUDDHIST,PC_HINDU,PC_JEWISH,PC_MUSLIM,PC_SIKH,PC_OTHER_RELIGION,PC_NOT_ANSWERED&outSR=4326&f=json"
};


    const params = new URLSearchParams(window.location.search);
    const selectedWard = params.get("ward");
    console.log("Selected Ward:", selectedWard);


    const selectedTags = params.getAll("info"); // ["1","5","10"]

    console.log("Selected Tags:", selectedTags);

    const main = document.querySelector("main");

    selectedTags.forEach(tag => {

        const url = tagToQuery[tag];

        if (!url) {
            console.log("No dataset for tag:", tag);
            return;
        }

        fetch(url)
            .then(res => res.json())
            .then(data => {

                displayTable(tag, data);

            })
            .catch(err => console.error("Error:", err));

    });


    function displayTable(tag, data) {

const container = document.createElement("div");

const title = document.createElement("h2");
title.textContent = "Tag " + tag + " (" + selectedWard + ")";
container.appendChild(title);

const table = document.createElement("table");
table.border = "1";

const features = data.features;

if (!features || features.length === 0) {
container.appendChild(document.createTextNode("No data"));
main.appendChild(container);
return;
}


const filtered = features.filter(f => {
const a = f.attributes;


return (
(a.WARD_NAME && a.WARD_NAME === selectedWard) ||
(a.WARD && a.WARD === selectedWard)
);
});

if (filtered.length === 0) {
container.appendChild(document.createTextNode("No data for this ward"));
main.appendChild(container);
return;
}

const headerRow = document.createElement("tr");
const keys = Object.keys(filtered[0].attributes);

keys.forEach(k => {
const th = document.createElement("th");
th.textContent = k;
headerRow.appendChild(th);
});

table.appendChild(headerRow);

filtered.forEach(f => {
const row = document.createElement("tr");

keys.forEach(k => {
const td = document.createElement("td");
td.textContent = f.attributes[k];
row.appendChild(td);
});

table.appendChild(row);
});

container.appendChild(table);
main.appendChild(container);
}

</script>

</body>

</html>
